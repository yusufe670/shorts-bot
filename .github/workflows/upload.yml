name: Shorts Otomatik Yükle

on:
  schedule:
    # UTC saatiyle her 4 saatte bir = günde 6 yükleme.
    # Bu, YouTube API varsayılan kotasına (10.000 birim ≈ 6 yükleme/gün) TAM sığar,
    # yani kota hatası almazsın. Daha sık istersen '0 */3 * * *' yap (günde 8) ama
    # o zaman günde 2 yükleme kota aşımıyla atlanır (veri kaybı olmaz, sonra denenir).
    - cron: "0 */4 * * *"
  workflow_dispatch: {}   # Actions sekmesinden elle de tetikleyebilirsin

# progress.json'u repoya geri yazabilmek için yazma izni
permissions:
  contents: write

concurrency:
  group: shorts-upload
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıklar
        run: pip install -r requirements.txt

      - name: Sıradaki parçayı yükle
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python scripts/upload.py

      - name: İlerlemeyi kaydet
        run: |
          if ! git diff --quiet -- state/progress.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/progress.json
            git commit -m "chore: ilerleme güncellendi [skip ci]"
            git push
          else
            echo "İlerleme değişmedi (yükleme yapılmadı veya seri bitti)."
          fi
