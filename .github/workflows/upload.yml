name: (Eski) Parça Yükleyici - Manuel

# NOT: Bu eski sistem (uzun videoyu bölüp parça yükleme) ARTIK OTOMATİK DEĞİL.
# Aktif sistem: ai_shorts.yml (AI ile üretilen shorts). Çift yükleme olmasın diye
# bunun zamanlaması kapatıldı; sadece elle tetiklenebilir.
on:
  workflow_dispatch: {}   # sadece Actions sekmesinden elle

# progress.json'u repoya geri yazabilmek için yazma izni
permissions:
  contents: write

concurrency:
  group: shorts-upload
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıklar
        run: pip install -r requirements.txt

      - name: Sıradaki parçayı yükle
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python scripts/upload.py

      - name: İlerlemeyi kaydet
        run: |
          if ! git diff --quiet -- state/progress.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/progress.json
            git commit -m "chore: ilerleme güncellendi [skip ci]"
            git push
          else
            echo "İlerleme değişmedi (yükleme yapılmadı veya seri bitti)."
          fi
