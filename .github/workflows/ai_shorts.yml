name: AI Shorts Üret ve Yükle

on:
  schedule:
    # Her 8 saatte bir = günde 3 (Todd/Ümit: düşük performanslı/yeni kanalda ≤3/gün)
    - cron: "0 */8 * * *"
  workflow_dispatch: {}

concurrency:
  group: ai-shorts-upload
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  make-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ffmpeg kur
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Python bağımlılıkları
        run: pip install -r requirements.txt

      - name: Hikaye videosu üret (AI resimler)
        run: python scripts/generate_story.py

      - name: Videoyu indirilebilir yap (TikTok/Reels cross-post için)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-${{ github.run_number }}
          path: |
            output/short.mp4
            output/tiktok.txt
            output/thumb.jpg
          retention-days: 30
          if-no-files-found: ignore

      - name: YouTube'a yükle
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          PROGRESS_FILE: state/story_progress.json
          BANK_FILE: content/stories.json
        run: python scripts/upload_generated.py

      - name: İlerlemeyi kaydet (dayanıklı push — tekrar yüklemeyi önler)
        if: success()
        run: |
          git config user.name "shorts-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/story_progress.json
          if git diff --staged --quiet; then
            echo "İlerleme değişmedi, kaydedilecek bir şey yok."
            exit 0
          fi
          git commit -m "İlerleme: sıradaki hikaye [skip ci]"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin main; then
              echo "İlerleme kaydedildi (deneme $i)."
              exit 0
            fi
            echo "push denemesi $i reddedildi, yeniden eşitlenip denenecek..."
            sleep 3
          done
          echo "HATA: ilerleme 5 denemede push edilemedi." >&2
          exit 1
